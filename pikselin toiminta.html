<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>FY11 RGB pikselin värinmuodostus</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }

    h1 {
      margin-bottom: 30px;
    }

    .slider-container {
      margin-bottom: 30px;
    }

    label {
      display: inline-block;
      width: 20px;
    }

    input[type="range"] {
      width: 200px;
    }

    .main-display {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 40px;
      margin-top: 40px;
    }

    .section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .section h2 {
      margin-bottom: 15px;
      font-size: 1.1rem;
      text-align: center;
      border-bottom: 1px solid #ccc;
      padding-bottom: 5px;
      width: 100%;
    }

    .row {
      display: flex;
      align-items: flex-end;
      gap: 20px;
    }

    .pixel {
      width: 60px;
      height: 150px;
      flex-direction: column-reverse;
      display: flex;
      border: 1px solid #ccc;
      align-items: center;
    }

    .bar {
      width: 100%;
    }

    .composite {
      display: flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      height: fit-content;
      border: 1px solid #ccc;
      padding: 10px;
    }

    .pixel-zoom {
      display: flex;
    }

    .big-pixel {
      display: flex;
      flex-direction: row;
      margin-right: 4px;
    }

    .channel {
      width: 4px;
      height: 40px;
    }

    .final {
      width: 150px;
      height: 150px;
      border: 1px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .label {
      text-align: center;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <h1>FY11 RGB pikselin värinmuodostus</h1>

  <div class="slider-container">
    <div>
      <label for="r">R</label>
      <input type="range" id="r" min="0" max="255" value="120">
      <span id="rVal">120</span>
    </div>
    <div>
      <label for="g">G</label>
      <input type="range" id="g" min="0" max="255" value="80">
      <span id="gVal">80</span>
    </div>
    <div>
      <label for="b">B</label>
      <input type="range" id="b" min="0" max="255" value="200">
      <span id="bVal">200</span>
    </div>
  </div>

  <div class="main-display">
    <!-- OSA 1 -->
    <div class="section">
      <h2>Yksittäisen pikselin värikanavat</h2>
      <div class="row">
        <div class="pixel">
          <div class="bar" id="bar-r" style="background: red; height: 120px;"></div>
          <div class="label">R</div>
        </div>
        <div class="pixel">
          <div class="bar" id="bar-g" style="background: green; height: 80px;"></div>
          <div class="label">G</div>
        </div>
        <div class="pixel">
          <div class="bar" id="bar-b" style="background: blue; height: 200px;"></div>
          <div class="label">B</div>
        </div>
      </div>
    </div>

    <!-- OSA 2 -->
    <div class="section">
      <h2>Pikseleitä suurennettuna</h2>
      <div class="composite" id="composite">
        <div class="pixel-zoom" id="zoomedPixels"></div>
      </div>
    </div>

    <!-- OSA 3 -->
    <div class="section">
      <h2>Näyttö</h2>
      <div class="final" id="final">
        Näyttö
      </div>
    </div>
  </div>

  <script>
    const rSlider = document.getElementById('r');
    const gSlider = document.getElementById('g');
    const bSlider = document.getElementById('b');

    const rVal = document.getElementById('rVal');
    const gVal = document.getElementById('gVal');
    const bVal = document.getElementById('bVal');

    const barR = document.getElementById('bar-r');
    const barG = document.getElementById('bar-g');
    const barB = document.getElementById('bar-b');

    const final = document.getElementById('final');
    const zoomedPixels = document.getElementById('zoomedPixels');

    function updateColor() {
      const r = parseInt(rSlider.value);
      const g = parseInt(gSlider.value);
      const b = parseInt(bSlider.value);

      rVal.textContent = r;
      gVal.textContent = g;
      bVal.textContent = b;

      barR.style.height = (r * 0.6) + "px";
      barG.style.height = (g * 0.6) + "px";
      barB.style.height = (b * 0.6) + "px";

      const rgb = `rgb(${r}, ${g}, ${b})`;
      final.style.backgroundColor = rgb;

      zoomedPixels.innerHTML = "";
      for (let i = 0; i < 5; i++) {
        const pixel = document.createElement('div');
        pixel.className = 'big-pixel';

        const redBar = document.createElement('div');
        redBar.className = 'channel';
        redBar.style.backgroundColor = `rgb(${r}, 0, 0)`;

        const greenBar = document.createElement('div');
        greenBar.className = 'channel';
        greenBar.style.backgroundColor = `rgb(0, ${g}, 0)`;

        const blueBar = document.createElement('div');
        blueBar.className = 'channel';
        blueBar.style.backgroundColor = `rgb(0, 0, ${b})`;

        pixel.appendChild(redBar);
        pixel.appendChild(greenBar);
        pixel.appendChild(blueBar);
        zoomedPixels.appendChild(pixel);
      }
    }

    rSlider.addEventListener('input', updateColor);
    gSlider.addEventListener('input', updateColor);
    bSlider.addEventListener('input', updateColor);

    updateColor();
  </script>

</body>
</html>
